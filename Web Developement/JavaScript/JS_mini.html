<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="JS_mini.css">
    <title>Simon says Game</title>
</head>

<body>
    <h1>Simon Says Game</h1>
    <h2>Press any key to start</h2>
    <div class="button-container">
        <div class="line-one">
            <div class="btn red" type="button">1</div>
            <div class="btn yellow" type="button">2</div>
        </div>

        <div class="line-two">
            <div class="btn green" type="button">3</div>
            <div class="btn purple" type="button">4</div>
        </div>

    </div>
    <script src="JS_mini.js"></script>
</body>

</html>
