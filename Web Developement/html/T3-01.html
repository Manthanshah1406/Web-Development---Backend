<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Responsive Table</title>
</head>

<body>

    <!-- Section 1 -->
    <table class="table table-bordered table-striped table-hover table-sm text-center">
        <tr>
            <td colspan="2" class="fw-bold fs-5">Section 1</td>
        </tr>
        <tr class="row">
            <td class="col-12 col-sm-6">
                <img src="car.jpeg" class="img-fluid" alt="Image">
            </td>
            <td class="col-12 col-sm-6">
                <img src="car.jpeg" class="img-fluid" alt="Image">
            </td>
        </tr>
    </table>

    <!-- Section 2 -->
    <table class="table table-bordered table-striped table-hover table-sm text-center">
        <tr>
            <td colspan="2" class="fw-bold fs-5">Section 2</td>
        </tr>
        <tr class="row">
            <td class="col-12 col-sm-6">
                <img src="car.jpeg" class="" alt="Image">
            </td>
            <td class="col-12 col-sm-6">
                <img src="car.jpeg" class="img-fluid" alt="Image">
            </td>
        </tr>
    </table>

</body>
</html>
