<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Products Store</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Header -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Beauty Products Online Store</span>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4">
    <h2 class="text-center mb-4">Shop Beauty Products</h2>

    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 text-center">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Lipstick">
                <div class="card-body">
                    <h5 class="card-title">Lipstick</h5>
                    <p class="card-text">₹499</p>
                    <button class="btn btn-primary">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 text-center">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Face Cream">
                <div class="card-body">
                    <h5 class="card-title">Face Cream</h5>
                    <p class="card-text">₹699</p>
                    <button class="btn btn-primary">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 text-center">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Perfume">
                <div class="card-body">
                    <h5 class="card-title">Perfume</h5>
                    <p class="card-text">₹999</p>
                    <button class="btn btn-primary">Add to Cart</button>
                </div>
            </div>
        </div>

        <!-- Product 4 -->
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 text-center">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Makeup Kit">
                <div class="card-body">
                    <h5 class="card-title">Makeup Kit</h5>
                    <p class="card-text">₹1499</p>
                    <button class="btn btn-primary">Add to Cart</button>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center mt-5 p-3">
    © 2025 Beauty Products Store
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
